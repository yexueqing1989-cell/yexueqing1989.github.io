        }

            transition: all 0.3s ease;
        }

            transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;

            answers: Array(30).fill(null),
            results: null

        // --- 事件处理函数 ---
        
        function handleAnswer(score) {
            appState.answers[appState.currentQIndex] = score;
            
            if (appState.currentQIndex < QUESTIONS.length - 1) {
                setTimeout(() => {
                    appState.currentQIndex++;
                    render();
                }, 200);
            } else {
                render();
            }
        }

        function handlePrev() {
            if (appState.currentQIndex > 0) {
                appState.currentQIndex--;
                render();
            }
        }

        function calculateResult() {
            appState.step = 'loading';
            render();
            
            const scores = [0, 0, 0, 0, 0, 0];
            
            appState.answers.forEach((score, index) => {
                const dimensionIndex = Math.floor(index / 5);
                scores[dimensionIndex] += score;
            });

            const mappedResults = PROFILES.map((profile, idx) => ({
                ...profile,
                score: scores[idx],
                percentage: Math.round((scores[idx] / 25) * 100)
            }));

            const sortedResults = [...mappedResults].sort((a, b) => b.score - a.score);

            setTimeout(() => {
                appState.results = {
                    primary: sortedResults[0],
                    secondary: sortedResults[1],
                    allDimensions: mappedResults
                };
                appState.step = 'result';
                render();
            }, 1500);
        }

        function resetTest() {
            appState.answers = Array(30).fill(null);
            appState.currentQIndex = 0;
            appState.results = null;
            appState.step = 'start';

                                <div class="flex justify-between items-center mb-4 text-sm font-bold text-slate-400 tracking-wider">
                                    <span>天赋自测</span>
                                    <span class="text-purple-600 bg-purple-50 px-3 py-1 rounded-full">${appState.currentQIndex + 1} / ${QUESTIONS.length}</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                    <div 
                                        class="bg-purple-500 h-1.5 rounded-full transition-all duration-300 ease-out" 
                                        style="width: ${progress}%"
                                    ></div>
                                </div>
                            </div>

                            <div class="px-6 py-8 flex-grow">
                                <h2 class="text-xl md:text-2xl font-bold text-slate-800 leading-snug mb-8">
                                    ${QUESTIONS[appState.currentQIndex]}
                                </h2>

                                <div class="space-y-3">
                                    ${OPTIONS.map((opt, idx) => `
                                        <button
                                            onclick="handleAnswer(${opt.score})"
                                            class="w-full text-left p-4 rounded-2xl border-2 transition-all duration-200 font-medium ${
                                                appState.answers[appState.currentQIndex] === opt.score 
                                                    ? 'border-purple-500 bg-purple-50 text-purple-700 shadow-sm' 
                                                    : 'border-slate-100 bg-white text-slate-600 hover:border-purple-200 hover:bg-slate-50'
                                            }"
                                        >
                                            ${opt.text}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="p-6 pt-0 flex gap-4 mt-auto">
                                <button 
                                    onclick="handlePrev()"
                                    ${appState.currentQIndex === 0 ? 'disabled' : ''}
                                    class="flex-1 py-3.5 rounded-2xl font-semibold flex items-center justify-center transition-colors ${
                                        appState.currentQIndex === 0 ? 'bg-slate-50 text-slate-300 cursor-not-allowed' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                    }"
                                >
                                    ${icons.chevronLeft} 上一题
                                </button>
                                
                                ${isLastQuestion ? `
                                    <button 
                                        onclick="calculateResult()"
                                        ${appState.answers[appState.currentQIndex] === null ? 'disabled' : ''}
                                        class="flex-1 py-3.5 rounded-2xl font-semibold flex items-center justify-center transition-all ${
                                            appState.answers[appState.currentQIndex] === null 
                                                ? 'bg-slate-100 text-slate-400 cursor-not-allowed' 
                                                : 'bg-slate-900 text-white shadow-lg shadow-slate-900/20'
                                        }"
                                    >
                                        生成报告 ${icons.sparkles}
                                    </button>
                                ` : `
                                    <button 
                                        onclick="handleAnswer(${appState.answers[appState.currentQIndex]})"
                                        ${appState.answers[appState.currentQIndex] === null ? 'disabled' : ''}
                                        class="flex-1 py-3.5 rounded-2xl font-semibold flex items-center justify-center transition-all ${
                                            appState.answers[appState.currentQIndex] === null 
                                                ? 'bg-slate-100 text-slate-400 cursor-not-allowed' 
                                                : 'bg-purple-600 text-white shadow-md shadow-purple-500/20'
                                        }"
                                    >
                                        下一题 ${icons.chevronRight}
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            } else if (appState.step === 'loading') {
                app.innerHTML = `
                    <div class="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 font-sans text-white">
                        ${icons.refreshCwLarge}
                        <h2 class="text-xl font-bold mb-2">正在解码您的财富矩阵...</h2>
                        <p class="text-slate-400 text-sm">融合盖洛普与行为金融学数据</p>
                    </div>
                `;
            } else if (appState.step === 'result' && appState.results) {
                const { primary, secondary, allDimensions } = appState.results;

                app.innerHTML = `
                    <div class="min-h-screen bg-slate-100 py-8 px-4 font-sans flex justify-center">
                        <div class="max-w-md w-full space-y-6">
                            
                            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                                <div class="bg-slate-900 px-6 py-8 text-white relative">
                                    <div class="absolute top-0 right-0 p-4 opacity-20">
                                        ${icons.barChartLarge}
                                    </div>
                                    <p class="text-purple-300 font-bold tracking-widest text-xs mb-3">天赋能力鉴定报告</p>
                                    <h2 class="text-sm font-medium text-slate-300 mb-1">主导搞钱形式</h2>
                                    <h1 class="text-4xl font-extrabold mb-4">${primary.name}</h1>
                                    <p class="text-base text-slate-200 leading-relaxed italic border-l-4 border-purple-500 pl-3">
                                        "${primary.tagline}"
                                    </p>
                                </div>

                                <div class="p-6 bg-[#FAFAFA] border-b border-slate-100">
                                    <h3 class="text-slate-800 font-bold mb-6 flex items-center">
                                        ${icons.barChart2}
                                        各项天赋分值
                                    </h3>
                                    <div class="space-y-4">
                                        ${allDimensions.map((dim) => `
                                            <div class="flex items-center text-sm">
                                                <span class="w-24 font-medium text-slate-600 truncate pr-2">${dim.name}</span>
                                                <div class="flex-grow bg-slate-200 rounded-full h-3 overflow-hidden relative flex items-center">
                                                    <div 
                                                        class="h-full rounded-full ${dim.id === primary.id ? 'bg-purple-600' : 'bg-slate-400'}"
                                                        style="width: ${dim.percentage}%"
                                                    ></div>
                                                </div>
                                                <span class="w-12 text-right font-bold text-slate-700 ml-2">${dim.score}分</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                <div class="p-6 space-y-6">
                                    <div>
                                        <h4 class="text-xs font-bold tracking-widest text-slate-400 mb-2 uppercase">辅助天赋</h4>
                                        <div class="inline-block bg-slate-100 text-slate-700 px-4 py-2 rounded-xl text-sm font-bold border border-slate-200">
                                            ${secondary.name} (${secondary.score}分)
                                        </div>
                                    </div>

                                    <div>
                                        <h4 class="text-xs font-bold tracking-widest text-slate-400 mb-2 uppercase">底层逻辑</h4>
                                        <p class="text-sm text-slate-700 leading-relaxed bg-slate-50 p-4 rounded-2xl">
                                            ${primary.logic}
                                        </p>
                                    </div>

                                    <div>
                                        <h4 class="text-xs font-bold tracking-widest text-purple-500 mb-2 uppercase">搞钱建议（实操方向）</h4>
                                        <p class="text-sm text-slate-700 leading-relaxed bg-purple-50 border border-purple-100 p-4 rounded-2xl">
                                            ${primary.advice}
                                        </p>
                                    </div>

                                    <div>
                                        <h4 class="text-xs font-bold tracking-widest text-rose-500 mb-2 uppercase">致命盲区</h4>
                                        <p class="text-sm text-slate-700 leading-relaxed bg-rose-50 border border-rose-100 p-4 rounded-2xl">
                                            ${primary.blindspot}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-4">
                                <button 
                                    onclick="alert('已复制链接，快去小红书/朋友圈分享你的天赋雷达吧！')"
                                    class="flex-1 bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-bold flex justify-center items-center shadow-lg transition-colors"
                                >
                                    ${icons.share} 邀请朋友测
                                </button>
                                <button 
                                    onclick="resetTest()"
                                    class="bg-white text-slate-600 py-4 px-6 rounded-2xl font-bold flex justify-center items-center shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors"
                                >
                                    ${icons.refreshCw}
                                </button>
                            </div>
                            
                        </div>
                    </div>
                `;
            }
        }

        // 初始渲染
        render();
    </script>
</body>
</html>
